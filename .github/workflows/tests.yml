name: Python tests

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - '.badges/**'
  pull_request:
    branches: [ main, master ]

jobs:

  test:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    container:
      image: ghcr.io/halmosb/docker-builder/python:${{ matrix.python-version }}-cpu-v0.3.4
      options: --user 0

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Mark workspace as git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Print logs
        run: |
          which python
          python --version
          pip list

      - name: Run tests
        run: |
          pytest --cov=artificial_dataset \
            --durations=0 \
            --cov-report term \
            --cov-report html:coverage-html \
            --cov-report xml:coverage-report.xml \
            --junitxml=junit-report.xml
          coverage-badge -o coverage.svg

      - name: Save artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage-html
            coverage-report.xml
            junit-report.xml

      - name: Deploy coverage badge
        if: (matrix.python-version == '3.14') && (github.event_name == 'push') && (github.repository == 'bhalmos/altx')
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          mkdir -p .badges
          mv coverage.svg .badges/coverage.svg

          git add .badges/coverage.svg

          # Avoid failing if nothing changed
          git diff --cached --quiet || git commit -m "Update coverage badge"

          git push origin HEAD:${GITHUB_REF_NAME}
