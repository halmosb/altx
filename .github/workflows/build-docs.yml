name: Build and Deploy Docs

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths-ignore:
      - '.badges/**'
  pull_request:
    branches: [ master, main ]

# Serialize deployments; never cancel an in-progress deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/halmosb/docker-builder/python:3.14-cpu-v0.3.4
      options: --user 0
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Mark workspace as git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build HTML docs
        run: |
          sphinx-build -b html docs/source docs/_build/html
          sphinx-build -W -T -b html docs/source docs/_build/html

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html-docs
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: html-docs
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/_build/html
